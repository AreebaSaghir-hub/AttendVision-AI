<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AttendVision AI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">👁️</span>
      <div>
        <div class="logo-name">AttendVision</div>
        <div class="logo-sub">AI System</div>
      </div>
    </div>
    <ul class="nav-links">
      <li><a href="{{ url_for('dashboard') }}" class="{% if request.endpoint=='dashboard' %}active{% endif %}">
        <span class="nav-icon">📊</span> Dashboard
      </a></li>
      <li><a href="{{ url_for('live') }}" class="{% if request.endpoint=='live' %}active{% endif %}">
        <span class="nav-icon">📹</span> Live Recognition
      </a></li>
      <li><a href="{{ url_for('students') }}" class="{% if request.endpoint=='students' %}active{% endif %}">
        <span class="nav-icon">👥</span> Students
      </a></li>
      <li><a href="{{ url_for('register') }}" class="{% if request.endpoint=='register' %}active{% endif %}">
        <span class="nav-icon">➕</span> Register Face
      </a></li>
      <li><a href="{{ url_for('attendance') }}" class="{% if request.endpoint=='attendance' %}active{% endif %}">
        <span class="nav-icon">📋</span> Attendance Log
      </a></li>
    </ul>
    <div class="sidebar-footer">
      <a href="{{ url_for('logout') }}" class="btn-logout">⬅ Logout</a>
    </div>
  </nav>

  <main class="main-content">
    <header class="topbar">
      <h2>{% block page_title %}{% endblock %}</h2>
      <div class="topbar-right">
        <span class="badge-admin">🔐 Admin</span>
        <span class="topbar-time" id="liveTime"></span>
      </div>
    </header>
    <div class="content-area">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script>
    function updateTime() {
      const el = document.getElementById('liveTime');
      if (el) el.textContent = new Date().toLocaleTimeString();
    }
    updateTime();
    setInterval(updateTime, 1000);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
